name: publish release
on:
  workflow_dispatch:

jobs:
  build-test:
    uses: maikuvit/testing_RDM/.github/workflows/build-and-test.yml@main

  publish:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          cache: 'npm'
          registry-url: https://npm.pkg.github.com/
      - run: npm ci
      - run: npm publish
        env: 
          NPM_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}